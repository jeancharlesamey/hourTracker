<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hour Tracker</title>
  <!-- PWA -->
  <link rel="manifest" href="./manifest.json">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Hour Tracker">
  <link rel="apple-touch-icon" href="./icons/icon-192.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            surface: { DEFAULT: '#f5f5f5', dark: '#1a1a2e' },
            card: { DEFAULT: '#ffffff', dark: '#16213e' },
            accent: { DEFAULT: '#e0e7ff', dark: '#0f3460' },
            muted: { DEFAULT: '#d1d5db', dark: '#333a56' },
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; }

    .bottom-sheet {
      transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }
    .bottom-sheet.closed {
      transform: translateY(100%);
    }

    .day-cell:hover { opacity: 0.85; }

    .settings-overlay {
      transition: opacity 0.2s ease, visibility 0.2s ease;
    }
    .settings-overlay.hidden {
      opacity: 0;
      visibility: hidden;
    }

    .color-swatch {
      transition: transform 0.15s ease, box-shadow 0.15s ease;
    }
    .color-swatch:hover { transform: scale(1.2); }
    .color-swatch.active {
      box-shadow: 0 0 0 2px #fff, 0 0 0 4px currentColor;
      transform: scale(1.15);
    }

    /* Month transition — only applied when month changes */
    @keyframes monthFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .month-fade { animation: monthFadeIn 1s ease; }

    /* Bottom sheet task list fade — applied when day changes */
    @keyframes sheetFadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    .sheet-fade { animation: sheetFadeIn 0.8s ease; }

    /* Selected dot spin */
    @keyframes dotSpin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    .dot-spin { animation: dotSpin 6s linear infinite; transform-origin: center; }

    /* Nav arrow */
    .nav-arrow {
      transition: background 0.15s ease, opacity 0.15s ease;
    }
    .nav-arrow:disabled {
      opacity: 0.2;
      cursor: default;
    }
  </style>
</head>
<body class="bg-surface dark:bg-surface-dark text-gray-900 dark:text-white min-h-screen flex flex-col overflow-hidden select-none transition-colors duration-300">

  <!-- Skip link -->
  <a href="#calendarGrid" class="sr-only focus:not-sr-only focus:absolute focus:top-2 focus:left-2 focus:z-50 focus:bg-white focus:text-black focus:px-3 focus:py-2 focus:rounded-lg focus:text-sm focus:font-medium">Skip to calendar</a>

  <!-- Toast container -->
  <div id="toastContainer" role="status" aria-live="polite" class="fixed top-4 left-1/2 -translate-x-1/2 z-50 flex flex-col items-center gap-2 pointer-events-none"></div>

  <!-- Header -->
  <header class="flex items-center justify-between px-4 md:px-8 py-3 md:py-4 bg-card/80 dark:bg-card-dark/80 backdrop-blur-sm border-b border-gray-200 dark:border-white/5 z-30 shrink-0 transition-colors duration-300">
    <h1 class="text-lg md:text-xl font-bold tracking-tight">Hour Tracker</h1>
    <div class="flex items-center gap-3">
      <span id="streakBadge" class="text-xs md:text-sm bg-red-500/20 text-red-600 dark:text-red-400 px-2 py-0.5 rounded-full font-medium hidden">0 burnout days</span>
      <button id="settingsBtn" aria-label="Settings" class="w-8 h-8 md:w-9 md:h-9 flex items-center justify-center rounded-lg hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
        <svg aria-hidden="true" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.066 2.573c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.573 1.066c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.066-2.573c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"/>
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
        </svg>
      </button>
    </div>
  </header>

  <!-- Calendar -->
  <main id="calendarArea" class="flex-1 flex flex-col px-4 md:px-8 py-4 overflow-hidden">
    <!-- Legend -->
    <div class="flex items-center justify-between mb-4">
      <div id="legend" class="flex flex-wrap gap-3 md:gap-4 text-xs md:text-sm"></div>
      <button id="todayBtn" aria-label="Go to today" class="hidden text-xs font-medium text-black bg-white hover:bg-white/80 px-3 py-1 rounded-full transition-colors shrink-0">Go to today</button>
    </div>

    <!-- Month Navigation -->
    <div class="flex items-center justify-between mb-3 md:mb-4">
      <button id="prevMonth" aria-label="Previous month" class="nav-arrow w-9 h-9 md:w-10 md:h-10 flex items-center justify-center rounded-lg hover:bg-black/5 dark:hover:bg-white/10">
        <svg aria-hidden="true" class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
      </button>
      <button id="monthLabel" class="text-sm md:text-lg font-semibold text-gray-500 dark:text-white/70 hover:text-gray-700 dark:hover:text-white/90 transition-colors px-3 py-1 rounded-lg hover:bg-black/5 dark:hover:bg-white/5">
        <!-- filled by JS -->
      </button>
      <button id="nextMonth" aria-label="Next month" class="nav-arrow w-9 h-9 md:w-10 md:h-10 flex items-center justify-center rounded-lg hover:bg-black/5 dark:hover:bg-white/10">
        <svg aria-hidden="true" class="w-5 h-5 md:w-6 md:h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
      </button>
    </div>

    <!-- Calendar Grid (single month) -->
    <div id="calendarGrid" class="flex-1"></div>
  </main>

  <!-- Bottom Sheet (task checklist) -->
  <div id="bottomSheet" role="dialog" aria-label="Task checklist" class="bottom-sheet closed fixed bottom-0 left-0 right-0 bg-card dark:bg-card-dark border-t border-gray-200 dark:border-white/10 rounded-t-2xl z-20 max-h-[55vh] flex flex-col md:max-w-[35rem] md:mx-auto md:left-auto md:right-4 md:rounded-2xl md:bottom-4 md:border md:max-h-[50vh] transition-colors duration-300">
    <!-- Drag handle -->
    <div class="flex justify-center pt-2 pb-1 shrink-0 md:hidden">
      <div class="w-10 h-1 rounded-full bg-gray-300 dark:bg-white/20"></div>
    </div>
    <!-- Header with close button -->
    <div class="flex items-center justify-between px-5 pt-1 pb-2 shrink-0 md:pt-3">
      <div class="flex items-center gap-3">
        <h2 id="sheetDate" class="text-sm md:text-base font-semibold text-gray-500 dark:text-white/70">Today</h2>
        <span id="sheetProgress" class="inline-block min-w-[5rem] text-xs md:text-sm text-gray-400 dark:text-white/60 tabular-nums">0h / 8h</span>
      </div>
      <button id="closeSheet" aria-label="Close task list" class="w-7 h-7 flex items-center justify-center rounded-lg hover:bg-black/5 dark:hover:bg-white/10 transition-colors">
        <svg aria-hidden="true" class="w-4 h-4 text-gray-400 dark:text-white/50" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <!-- Task list -->
    <div id="taskList" class="px-5 pb-5 space-y-3 overflow-y-auto"></div>
  </div>

  <!-- Month Summary Overlay -->
  <div id="monthSummaryOverlay" role="dialog" aria-modal="true" aria-label="Month Summary" class="settings-overlay hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40 flex items-end sm:items-center justify-center">
    <div class="bg-card dark:bg-card-dark w-full max-w-md rounded-t-2xl sm:rounded-2xl p-6 max-h-[85vh] overflow-y-auto transition-colors duration-300">
      <div class="flex items-center justify-between mb-5">
        <h2 id="summaryTitle" class="text-lg font-bold"></h2>
        <button id="closeSummary" aria-label="Close summary" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-black/5 dark:hover:bg-white/10">
          <svg aria-hidden="true" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <div id="summaryContent"></div>
    </div>
  </div>

  <!-- Settings Overlay -->
  <div id="settingsOverlay" role="dialog" aria-modal="true" aria-label="Settings" class="settings-overlay hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-40 flex items-end sm:items-center justify-center">
    <div class="bg-card dark:bg-card-dark w-full max-w-md rounded-t-2xl sm:rounded-2xl p-6 max-h-[85vh] overflow-y-auto transition-colors duration-300">
      <div class="flex items-center justify-between mb-6">
        <h2 class="text-lg font-bold">Settings</h2>
        <button id="closeSettings" aria-label="Close settings" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-black/5 dark:hover:bg-white/10">
          <svg aria-hidden="true" class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
          </svg>
        </button>
      </div>
      <!-- Dark mode toggle -->
      <div class="flex items-center justify-between mb-5 pb-5 border-b border-gray-200 dark:border-white/10">
        <div>
          <span class="text-sm font-medium">Dark mode</span>
          <p class="text-xs text-gray-400 dark:text-white/40 mt-0.5">Switch between light and dark theme</p>
        </div>
        <button id="darkModeToggle" role="switch" aria-checked="true" aria-label="Dark mode"
          class="relative w-11 h-6 rounded-full bg-gray-300 dark:bg-emerald-500 transition-colors duration-200 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-emerald-500">
          <span id="darkModeKnob" class="absolute top-0.5 left-0.5 w-5 h-5 rounded-full bg-white shadow transition-transform duration-200 translate-x-5"></span>
        </button>
      </div>
      <div id="settingsTasks" class="space-y-5"></div>
      <div class="mt-6 pt-4 border-t border-gray-200 dark:border-white/10 text-center">
        <button id="resetBtn" class="text-xs text-red-400 hover:text-red-300 transition-colors">Delete all data</button>
      </div>
    </div>
  </div>

  <!-- Delete confirm modal -->
  <div id="deleteModal" class="settings-overlay hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center px-6">
    <div class="bg-card dark:bg-card-dark w-full max-w-sm rounded-2xl p-6 shadow-xl transition-colors duration-300">
      <h2 class="text-base font-bold mb-1">Delete — Are you sure?</h2>
      <p class="text-sm text-gray-400 dark:text-white/40 mb-6">All data will be permanently removed. This cannot be undone.</p>
      <div class="flex gap-3 justify-end">
        <button id="deleteCancelBtn" class="px-4 py-2 rounded-lg text-sm font-medium bg-black/5 dark:bg-white/10 hover:bg-black/10 dark:hover:bg-white/20 transition-colors">Cancel</button>
        <button id="deleteConfirmBtn" class="px-4 py-2 rounded-lg text-sm font-medium bg-red-500 hover:bg-red-600 text-white transition-colors">Delete</button>
      </div>
    </div>
  </div>

  <script>
    // ── Constants ──────────────────────────────────────────
    const PALETTE = [
      '#ef4444','#f97316','#f59e0b','#eab308',
      '#84cc16','#22c55e','#14b8a6','#06b6d4',
      '#3b82f6','#6366f1','#8b5cf6','#a855f7',
      '#d946ef','#ec4899','#f43f5e','#78716c',
    ];

    const COLOR_NAMES = {
      '#ef4444': 'Red', '#f97316': 'Orange', '#f59e0b': 'Amber', '#eab308': 'Yellow',
      '#84cc16': 'Lime', '#22c55e': 'Green', '#14b8a6': 'Teal', '#06b6d4': 'Cyan',
      '#3b82f6': 'Blue', '#6366f1': 'Indigo', '#8b5cf6': 'Violet', '#a855f7': 'Purple',
      '#d946ef': 'Fuchsia', '#ec4899': 'Pink', '#f43f5e': 'Rose', '#78716c': 'Stone',
    };

    const DEFAULT_TASKS = [
      { name: 'Exercise', color: '#22c55e' },
      { name: 'Read', color: '#3b82f6' },
      { name: 'Meditate', color: '#a855f7' },
      { name: 'Journal', color: '#f59e0b' },
    ];

    const MAX_MONTHS_BACK = 24;

    // ── State ─────────────────────────────────────────────
    let tasks = loadJSON('dt_tasks', DEFAULT_TASKS);
    let completions = loadJSON('dt_completions', {});
    let selectedDate = null; // null = no day selected, sheet closed
    let sheetOpen = false;

    // ── Dark mode ────────────────────────────────────────
    let darkMode = localStorage.getItem('dt_darkMode') !== 'false'; // default: dark
    function applyDarkMode() {
      if (darkMode) {
        document.documentElement.classList.add('dark');
      } else {
        document.documentElement.classList.remove('dark');
      }
      // Update toggle UI
      const toggle = document.getElementById('darkModeToggle');
      const knob = document.getElementById('darkModeKnob');
      if (toggle && knob) {
        toggle.setAttribute('aria-checked', darkMode);
        if (darkMode) {
          knob.classList.add('translate-x-5');
          knob.classList.remove('translate-x-0');
        } else {
          knob.classList.remove('translate-x-5');
          knob.classList.add('translate-x-0');
        }
      }
    }
    // Apply immediately before paint
    applyDarkMode();

    // Current displayed month (year, month index 0-11)
    const now = new Date();
    let viewYear = now.getFullYear();
    let viewMonth = now.getMonth();

    // ── Helpers ────────────────────────────────────────────
    function todayStr() {
      const d = new Date();
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }

    function parseDate(str) {
      const [y,m,d] = str.split('-').map(Number);
      return new Date(y, m-1, d);
    }

    function ordinal(n) {
      if (n > 3 && n < 21) return 'th';
      switch (n % 10) {
        case 1: return 'st';
        case 2: return 'nd';
        case 3: return 'rd';
        default: return 'th';
      }
    }

    function getWeekOfYear(date) {
      const d = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      const dow = d.getUTCDay() || 7; // Mon=1 … Sun=7
      d.setUTCDate(d.getUTCDate() + 4 - dow); // nearest Thursday
      const yearStart = new Date(Date.UTC(d.getUTCFullYear(), 0, 1));
      return Math.ceil(((d - yearStart) / 86400000 + 1) / 7);
    }

    function formatDate(str) {
      const d = parseDate(str);
      const weekday = d.toLocaleDateString('en-US', { weekday: 'long' });
      const month = d.toLocaleDateString('en-US', { month: 'short' });
      const day = d.getDate();
      return `${weekday}, ${month} ${day}${ordinal(day)}`;
    }

    function dateStr(date) {
      return `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
    }

    function loadJSON(key, fallback) {
      try { return JSON.parse(localStorage.getItem(key)) || fallback; }
      catch { return fallback; }
    }

    function showToast(message, type = 'error') {
      const container = document.getElementById('toastContainer');
      const toast = document.createElement('div');
      const colors = type === 'error'
        ? 'bg-red-500/90 text-white'
        : 'bg-emerald-500/90 text-white';
      toast.className = `${colors} px-4 py-2 rounded-lg text-sm font-medium shadow-lg pointer-events-auto transition-all duration-300 opacity-0 translate-y-[-8px]`;
      toast.textContent = message;
      container.appendChild(toast);
      requestAnimationFrame(() => {
        toast.classList.remove('opacity-0', 'translate-y-[-8px]');
      });
      setTimeout(() => {
        toast.classList.add('opacity-0', 'translate-y-[-8px]');
        setTimeout(() => toast.remove(), 300);
      }, 3000);
    }

    function fmtH(h) {
      if (h === 0) return '—';
      return `${parseFloat(h.toFixed(2))}h`;
    }

    // Work schedule: 9am–12pm (3h), break 12–1:30pm (1.5h), 1:30pm onward
    // Afternoon arc runs 135°–360° (7.5h) — overflow beyond 8h keeps filling
    function buildStackedDotGradient(tasksArr, comp, emptyDot, gapColor) {
      if (comp.every(h => !h)) return emptyDot;
      const DEG         = 30;        // degrees per hour
      const MORNING_END = 3   * DEG; // 90°  = 12:00
      const LUNCH_END   = 4.5 * DEG; // 135° = 13:30
      const AFTERNOON_CAP = (360 - LUNCH_END) / DEG; // 7.5h — fills to full circle

      const sorted = tasksArr
        .map((t, i) => ({ color: t.color, h: Math.max(0, comp[i] || 0) }))
        .sort((a, b) => b.h - a.h);

      const mSegs = [], aSegs = [];
      let mPos = 0, aPos = 0;

      for (const task of sorted) {
        let h = task.h;
        if (h <= 0) continue;
        if (mPos < 3) {
          const take = Math.min(h, 3 - mPos);
          mSegs.push({ color: task.color, start: mPos * DEG, end: (mPos + take) * DEG });
          mPos += take; h -= take;
        }
        if (h > 0 && aPos < AFTERNOON_CAP) {
          const take = Math.min(h, AFTERNOON_CAP - aPos);
          aSegs.push({ color: task.color, start: LUNCH_END + aPos * DEG, end: LUNCH_END + (aPos + take) * DEG });
          aPos += take;
        }
      }

      const s = [];
      for (const seg of mSegs) s.push(`${seg.color} ${seg.start}deg ${seg.end}deg`);
      if (mPos * DEG < MORNING_END) s.push(`${emptyDot} ${mPos * DEG}deg ${MORNING_END}deg`);
      s.push(`${gapColor} ${MORNING_END}deg ${LUNCH_END}deg`);
      for (const seg of aSegs) s.push(`${seg.color} ${seg.start}deg ${seg.end}deg`);
      if (LUNCH_END + aPos * DEG < 360) s.push(`${emptyDot} ${LUNCH_END + aPos * DEG}deg 360deg`);

      return `conic-gradient(from 270deg, ${s.join(', ')})`;
    }

    function save() {
      try {
        localStorage.setItem('dt_tasks', JSON.stringify(tasks));
        localStorage.setItem('dt_completions', JSON.stringify(completions));
      } catch (e) {
        showToast('Could not save — storage is full or unavailable');
      }
    }

    function getCompletions(date) {
      const raw = completions[date] || [];
      return tasks.map((_, i) => {
        const v = raw[i];
        return typeof v === 'boolean' ? (v ? 1 : 0) : (Number(v) || 0);
      });
    }

    // ── Burnout count (days > 8h in viewed month) ─────────
    function calcBurnout() {
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const todayS = todayStr();
      let count = 0;
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
        if (ds > todayS) break;
        const total = getCompletions(ds).reduce((a, b) => a + b, 0);
        if (total > 8) count++;
      }
      return count;
    }

    // ── Can navigate? ─────────────────────────────────────
    function canGoNext() {
      const today = new Date();
      return !(viewYear === today.getFullYear() && viewMonth === today.getMonth());
    }

    function canGoPrev() {
      const today = new Date();
      const minDate = new Date(today.getFullYear(), today.getMonth() - MAX_MONTHS_BACK, 1);
      const current = new Date(viewYear, viewMonth, 1);
      return current > minDate;
    }

    function isCurrentMonth() {
      const today = new Date();
      return viewYear === today.getFullYear() && viewMonth === today.getMonth();
    }

    // ── Render Legend ──────────────────────────────────────
    function renderLegend() {
      const el = document.getElementById('legend');
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const todayS = todayStr();
      el.innerHTML = tasks.map((t, i) => {
        let total = 0;
        for (let d = 1; d <= daysInMonth; d++) {
          const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
          if (ds > todayS) break;
          total += getCompletions(ds)[i] || 0;
        }
        const label = total > 0 ? `${t.name} (${fmtH(total)})` : t.name;
        return `
          <div class="flex items-center gap-1.5 md:gap-2">
            <div class="w-2.5 h-2.5 md:w-3 md:h-3 rounded-full" style="background:${t.color}"></div>
            <span class="text-gray-500 dark:text-white/70">${label}</span>
          </div>
        `;
      }).join('');
    }

    // ── Render Month Navigation ───────────────────────────
    function renderMonthNav() {
      const d = new Date(viewYear, viewMonth, 1);
      const label = d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });
      document.getElementById('monthLabel').textContent = label;
      document.getElementById('prevMonth').disabled = !canGoPrev();
      document.getElementById('nextMonth').disabled = !canGoNext();
      const todayBtn = document.getElementById('todayBtn');
      if (isCurrentMonth()) {
        todayBtn.classList.add('hidden');
      } else {
        todayBtn.classList.remove('hidden');
      }
    }

    // ── Render Calendar Grid (single month) ───────────────
    let prevViewYear = viewYear;
    let prevViewMonth = viewMonth;

    function renderCalendar() {
      const grid = document.getElementById('calendarGrid');
      const monthChanged = (viewYear !== prevViewYear || viewMonth !== prevViewMonth);
      prevViewYear = viewYear;
      prevViewMonth = viewMonth;
      const todayS = todayStr();
      const firstDay = new Date(viewYear, viewMonth, 1);
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      let startDow = firstDay.getDay() - 1;
      if (startDow < 0) startDow = 6;

      const dayLabels = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
      const dayLabelsMobile = ['M','T','W','T','F','S','S'];

      let html = `<div>`;
      html += `<div class="grid grid-cols-7 gap-1 md:gap-2">`;

      // Day-of-week headers
      for (let i = 0; i < 7; i++) {
        html += `<div class="text-[9px] md:text-xs text-gray-400 dark:text-white/50 text-center pb-1 md:pb-2">
          <span class="md:hidden">${dayLabelsMobile[i]}</span>
          <span class="hidden md:inline">${dayLabels[i]}</span>
        </div>`;
      }

      // Empty offset cells
      for (let e = 0; e < startDow; e++) {
        html += `<div></div>`;
      }

      // Day cells
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        const comp = getCompletions(ds);
        const isToday = ds === todayS;
        const isSelected = ds === selectedDate;
        const future = ds > todayS;
        const doneCount = comp.filter(h => h > 0).length;
        const dateLabel = new Date(viewYear, viewMonth, d).toLocaleDateString('en-US', { weekday: 'long', month: 'long', day: 'numeric' });
        const cellLabel = `${dateLabel}, ${doneCount} task(s) with hours logged${isToday ? ', today' : ''}`;

        const totalHours = comp.reduce((a, b) => a + b, 0);
        const overHours = totalHours > 8;
        const emptyDot = darkMode ? 'rgba(255,255,255,0.08)' : 'rgba(0,0,0,0.08)';
        const gapColor = overHours
          ? '#ef4444'
          : (darkMode ? '#1a1a2e' : '#f5f5f5');
        html += `<div class="day-cell aspect-square rounded-sm md:rounded-md cursor-pointer relative ${overHours ? 'bg-red-500' : ''} ${isSelected ? `ring-2 ${overHours ? 'ring-red-300' : 'ring-gray-500 dark:ring-white/60'}` : ''} ${future ? 'opacity-20 pointer-events-none' : ''} focus:outline-none focus:ring-2 focus:ring-white/60"
                      role="button" tabindex="${future ? -1 : 0}" aria-label="${cellLabel}"
                      data-date="${ds}">`;
        const dotBg = buildStackedDotGradient(tasks, comp, emptyDot, gapColor);
        html += `<div class="w-full h-full p-[10%]">`;
        html += `<div class="w-full h-full rounded-full${isSelected ? ' dot-spin' : ''}" style="background:${dotBg}"></div>`;
        html += `</div>`;
        const numColor = totalHours > 0 ? (overHours ? '#fca5a5' : 'white') : '';
        const numStyle = totalHours > 0 ? `color:${numColor};text-shadow:0 2px 12px rgba(0,0,0,0.35),0 0 20px rgba(0,0,0,0.2)` : '';
        const numClass = totalHours > 0 ? '' : (darkMode ? 'text-white/60' : 'text-gray-400');
        html += `<span class="absolute inset-0 flex items-center justify-center text-[1.5rem] md:text-[3.5rem] font-medium ${numClass}" style="${numStyle}">${d}</span>`;
        html += `</div>`;
      }

      html += `</div></div>`;
      grid.innerHTML = html;

      if (monthChanged) {
        grid.classList.remove('month-fade');
        void grid.offsetWidth;
        grid.classList.add('month-fade');
      }

      renderMonthNav();
      renderLegend();
    }

    // ── Select Day ────────────────────────────────────────
    function selectDay(ds) {
      selectedDate = ds;
      renderCalendar();
      renderTaskList();
      openSheet();
    }

    // ── Deselect (close sheet) ────────────────────────────
    function deselectDay() {
      selectedDate = null;
      closeSheet();
      renderCalendar();
    }

    // ── Render Task List (Bottom Sheet) ───────────────────
    function renderTaskList() {
      if (!selectedDate) return;
      const el = document.getElementById('taskList');
      const comp = getCompletions(selectedDate);
      const totalHours = comp.reduce((a, b) => a + b, 0);

      document.getElementById('sheetDate').textContent =
        selectedDate === todayStr() ? 'Today' : formatDate(selectedDate);
      document.getElementById('sheetProgress').textContent =
        `${totalHours % 1 === 0 ? totalHours : totalHours.toFixed(2)}h / 8h`;

      el.innerHTML = tasks.map((t, i) => `
        <div class="flex items-center gap-3 p-3 md:p-4 rounded-xl bg-black/5 dark:bg-white/5">
          <div class="w-3 h-3 rounded-full shrink-0" style="background:${t.color}"></div>
          <span class="flex-1 text-sm md:text-base font-medium text-gray-900 dark:text-white/90">${t.name}</span>
          <input type="number" min="0" step="0.25" value="${comp[i] || 0}"
            class="w-20 bg-black/5 dark:bg-white/10 border border-gray-200 dark:border-white/10 rounded-lg px-2 py-1.5 text-sm text-right text-gray-900 dark:text-white focus:outline-none focus:border-gray-400 dark:focus:border-white/30 transition-colors"
            onchange="updateHours(${i}, this.value)" onblur="updateHours(${i}, this.value)">
          <span class="text-xs text-gray-400 dark:text-white/40 w-3">h</span>
        </div>
      `).join('');

      updateStreak();
    }
    function updateHours(index, value) {
      if (!selectedDate) return;
      const comp = getCompletions(selectedDate);
      let hours = Math.round((parseFloat(value) || 0) * 100) / 100;
      hours = Math.max(0, hours);
      comp[index] = hours;
      const newTotal = comp.reduce((a, b) => a + b, 0);
      if (newTotal > 8) showToast('You are burning, be careful', 'error');
      completions[selectedDate] = comp;
      save();
      renderTaskList();
      renderCalendar();
    }

    // ── Month Summary ─────────────────────────────────────
    function openMonthSummary() {
      const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();
      const firstDay = new Date(viewYear, viewMonth, 1);
      let startDow = firstDay.getDay() - 1;
      if (startDow < 0) startDow = 6;
      const todayS = todayStr();
      const monthNames = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

      // Group days by calendar row (week)
      const weekGroups = {};
      for (let d = 1; d <= daysInMonth; d++) {
        const ds = `${viewYear}-${String(viewMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
        if (ds > todayS) break;
        const row = Math.floor((d - 1 + startDow) / 7);
        if (!weekGroups[row]) weekGroups[row] = [];
        weekGroups[row].push(ds);
      }

      const rows = Object.keys(weekGroups).sort((a,b) => a-b).map(r => weekGroups[r]);

      // Title
      const d = new Date(viewYear, viewMonth, 1);
      document.getElementById('summaryTitle').textContent =
        d.toLocaleDateString('en-US', { month: 'long', year: 'numeric' });

      if (rows.length === 0) {
        document.getElementById('summaryContent').innerHTML =
          `<p class="text-sm text-gray-400 dark:text-white/40 text-center py-6">No data for this month yet.</p>`;
        document.getElementById('monthSummaryOverlay').classList.remove('hidden');
        return;
      }

      const emptyColor = darkMode ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.10)';
      let html = '';

      // Per-week sections
      const monthTaskTotals = tasks.map(() => 0);
      let monthGrandTotal = 0;

      rows.forEach((weekDates, wi) => {
        const first = parseDate(weekDates[0]);
        const last  = parseDate(weekDates[weekDates.length - 1]);
        const fd = first.getDate(), ld = last.getDate();
        const range = first.getMonth() === last.getMonth()
          ? `${monthNames[first.getMonth()]} ${fd}${ordinal(fd)}–${ld}${ordinal(ld)}`
          : `${monthNames[first.getMonth()]} ${fd}${ordinal(fd)} – ${monthNames[last.getMonth()]} ${ld}${ordinal(ld)}`;
        const weekNum = getWeekOfYear(first);

        const taskHours = tasks.map((_, ti) =>
          weekDates.reduce((sum, ds) => sum + (getCompletions(ds)[ti] || 0), 0)
        );
        const weekTotal = taskHours.reduce((a, b) => a + b, 0);
        taskHours.forEach((h, i) => { monthTaskTotals[i] += h; });
        monthGrandTotal += weekTotal;

        html += `<div class="mb-4 pb-4 border-b border-gray-100 dark:border-white/5">`;
        html += `<div class="flex items-center justify-between mb-2.5">
          <span class="text-[11px] font-semibold text-gray-400 dark:text-white/40 uppercase tracking-wider">W${weekNum} · ${range}</span>
          <span class="text-xs font-bold ${weekTotal > 0 ? 'text-gray-700 dark:text-white/80' : 'text-gray-300 dark:text-white/20'}">${fmtH(weekTotal)}</span>
        </div>`;
        html += `<div class="grid grid-cols-4 gap-2">`;
        tasks.forEach((t, ti) => {
          const h = taskHours[ti];
          html += `<div class="flex flex-col items-center gap-1 py-2 px-1 rounded-xl bg-black/[0.03] dark:bg-white/[0.03]">
            <div class="w-2 h-2 rounded-full" style="background:${h > 0 ? t.color : emptyColor}"></div>
            <span class="text-xs font-medium ${h > 0 ? 'text-gray-700 dark:text-white/80' : 'text-gray-300 dark:text-white/20'}">${fmtH(h)}</span>
          </div>`;
        });
        html += `</div></div>`;
      });

      // Month total
      html += `<div class="pt-1">`;
      html += `<div class="flex items-center justify-between mb-2.5">
        <span class="text-[11px] font-semibold text-gray-500 dark:text-white/50 uppercase tracking-wider">Month Total</span>
        <span class="text-sm font-bold ${monthGrandTotal > 0 ? 'text-gray-900 dark:text-white' : 'text-gray-300 dark:text-white/20'}">${fmtH(monthGrandTotal)}</span>
      </div>`;
      html += `<div class="grid grid-cols-4 gap-2">`;
      tasks.forEach((t, ti) => {
        const h = monthTaskTotals[ti];
        html += `<div class="flex flex-col items-center gap-1.5 py-2.5 px-1 rounded-xl bg-black/5 dark:bg-white/5">
          <div class="w-2.5 h-2.5 rounded-full" style="background:${h > 0 ? t.color : emptyColor}"></div>
          <span class="text-xs font-semibold ${h > 0 ? 'text-gray-700 dark:text-white/80' : 'text-gray-300 dark:text-white/20'}">${fmtH(h)}</span>
          <span class="text-[10px] text-gray-400 dark:text-white/30 truncate w-full text-center">${t.name}</span>
        </div>`;
      });
      html += `</div></div>`;

      document.getElementById('summaryContent').innerHTML = html;
      document.getElementById('monthSummaryOverlay').classList.remove('hidden');
    }

    // ── Bottom Sheet Open/Close ───────────────────────────
    function openSheet() {
      sheetOpen = true;
      document.getElementById('bottomSheet').classList.remove('closed');
    }

    function closeSheet() {
      sheetOpen = false;
      document.getElementById('bottomSheet').classList.add('closed');
    }

    // Close button
    document.getElementById('closeSheet').addEventListener('click', (e) => {
      e.stopPropagation();
      deselectDay();
    });

    // ── Keyboard activation for day cells ─────────────────
    document.getElementById('calendarArea').addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        const dayCell = e.target.closest('.day-cell');
        if (dayCell && dayCell.dataset.date) {
          e.preventDefault();
          selectDay(dayCell.dataset.date);
        }
      }
    });

    // ── Click handling: day click vs outside click ────────
    document.getElementById('calendarArea').addEventListener('click', (e) => {
      const dayCell = e.target.closest('.day-cell');
      if (dayCell && dayCell.dataset.date) {
        selectDay(dayCell.dataset.date);
        return;
      }
      if (sheetOpen) deselectDay();
    });

    document.getElementById('bottomSheet').addEventListener('click', (e) => {
      e.stopPropagation();
    });

    // ── Month Navigation ──────────────────────────────────
    document.getElementById('prevMonth').addEventListener('click', () => {
      if (!canGoPrev()) return;
      viewMonth--;
      if (viewMonth < 0) { viewMonth = 11; viewYear--; }
      renderCalendar();
    });

    document.getElementById('nextMonth').addEventListener('click', () => {
      if (!canGoNext()) return;
      viewMonth++;
      if (viewMonth > 11) { viewMonth = 0; viewYear++; }
      renderCalendar();
    });

    document.getElementById('monthLabel').addEventListener('click', () => {
      openMonthSummary();
    });

    document.getElementById('todayBtn').addEventListener('click', (e) => {
      e.stopPropagation();
      const today = new Date();
      viewYear = today.getFullYear();
      viewMonth = today.getMonth();
      selectDay(todayStr());
    });

    // ── Scroll / Wheel to change month ────────────────────
    (function setupScrollNav() {
      const area = document.getElementById('calendarArea');
      let accumulated = 0;
      const THRESHOLD = 80;
      let cooldown = false;

      area.addEventListener('wheel', (e) => {
        e.preventDefault();
        if (cooldown) return;
        accumulated += e.deltaY;
        if (accumulated > THRESHOLD) {
          if (canGoNext()) {
            cooldown = true;
            viewMonth++;
            if (viewMonth > 11) { viewMonth = 0; viewYear++; }
            renderCalendar();
            setTimeout(() => { cooldown = false; }, 250);
          }
          accumulated = 0;
        } else if (accumulated < -THRESHOLD) {
          if (canGoPrev()) {
            cooldown = true;
            viewMonth--;
            if (viewMonth < 0) { viewMonth = 11; viewYear--; }
            renderCalendar();
            setTimeout(() => { cooldown = false; }, 250);
          }
          accumulated = 0;
        }
      }, { passive: false });

      let touchStartY = 0;
      let touchActive = false;

      area.addEventListener('touchstart', (e) => {
        touchStartY = e.touches[0].clientY;
        touchActive = true;
      }, { passive: true });

      area.addEventListener('touchend', (e) => {
        if (!touchActive) return;
        touchActive = false;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dy) < 60) return;
        if (dy > 0 && canGoPrev()) {
          viewMonth--;
          if (viewMonth < 0) { viewMonth = 11; viewYear--; }
          renderCalendar();
        } else if (dy < 0 && canGoNext()) {
          viewMonth++;
          if (viewMonth > 11) { viewMonth = 0; viewYear++; }
          renderCalendar();
        }
      }, { passive: true });
    })();

    // ── Burnout Badge ─────────────────────────────────────
    function updateStreak() {
      const count = calcBurnout();
      const badge = document.getElementById('streakBadge');
      if (count > 0) {
        badge.textContent = `${count} burnout day${count > 1 ? 's' : ''}`;
        badge.classList.remove('hidden');
      } else {
        badge.classList.add('hidden');
      }
    }

    // ── Settings ──────────────────────────────────────────
    function renderSettings() {
      const el = document.getElementById('settingsTasks');
      el.innerHTML = tasks.map((t, i) => `
        <div class="space-y-2">
          <div class="flex items-center justify-between">
            <label for="taskName${i}" class="text-xs text-gray-400 dark:text-white/60 font-medium">Task ${i + 1}</label>
            ${tasks.length > 1 ? `<button onclick="removeTask(${i})" class="text-xs text-red-400 hover:text-red-300 transition-colors" aria-label="Remove task ${i + 1}">Remove</button>` : ''}
          </div>
          <input id="taskName${i}" type="text" value="${t.name}" maxlength="20"
            class="w-full bg-black/5 dark:bg-white/5 border border-gray-200 dark:border-white/10 rounded-lg px-3 py-2 text-sm text-gray-900 dark:text-white placeholder-gray-300 dark:placeholder-white/20 focus:outline-none focus:border-gray-400 dark:focus:border-white/30 transition-colors"
            oninput="updateTaskName(${i}, this.value)">
          <div class="flex flex-wrap gap-2 pt-1">
            ${PALETTE.map(c => `
              <button class="color-swatch w-7 h-7 rounded-full ${c === t.color ? 'active' : ''}"
                style="background:${c};color:${c}"
                aria-label="${COLOR_NAMES[c] || c}${c === t.color ? ' (selected)' : ''}"
                onclick="updateTaskColor(${i}, '${c}')"></button>
            `).join('')}
          </div>
        </div>
      `).join('') + `
        <button onclick="addTask()" class="w-full mt-2 py-2 rounded-lg border border-dashed border-gray-300 dark:border-white/20 text-sm text-gray-400 dark:text-white/40 hover:border-gray-400 dark:hover:border-white/40 hover:text-gray-500 dark:hover:text-white/60 transition-colors">
          + Add task
        </button>
      `;
    }

    function updateTaskName(index, name) {
      tasks[index].name = name || `Task ${index + 1}`;
      save();
      renderLegend();
      if (sheetOpen) renderTaskList();
    }

    function updateTaskColor(index, color) {
      tasks[index].color = color;
      save();
      renderSettings();
      renderLegend();
      renderCalendar();
      if (sheetOpen) renderTaskList();
    }

    function addTask() {
      const usedColors = tasks.map(t => t.color);
      const nextColor = PALETTE.find(c => !usedColors.includes(c)) || PALETTE[tasks.length % PALETTE.length];
      tasks.push({ name: `Task ${tasks.length + 1}`, color: nextColor });
      save();
      renderSettings();
      renderLegend();
      renderCalendar();
      if (sheetOpen) renderTaskList();
    }

    function removeTask(index) {
      if (tasks.length <= 1) return;
      tasks.splice(index, 1);
      Object.keys(completions).forEach(date => {
        if (Array.isArray(completions[date])) {
          completions[date].splice(index, 1);
        }
      });
      save();
      renderSettings();
      renderLegend();
      renderCalendar();
      if (sheetOpen) renderTaskList();
    }

    document.getElementById('settingsBtn').addEventListener('click', () => {
      renderSettings();
      applyDarkMode();
      document.getElementById('settingsOverlay').classList.remove('hidden');
    });

    document.getElementById('darkModeToggle').addEventListener('click', () => {
      darkMode = !darkMode;
      try { localStorage.setItem('dt_darkMode', darkMode); } catch(e) {}
      applyDarkMode();
      renderCalendar();
      renderLegend();
      if (sheetOpen) renderTaskList();
    });

    document.getElementById('closeSettings').addEventListener('click', () => {
      document.getElementById('settingsOverlay').classList.add('hidden');
    });

    document.getElementById('settingsOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        document.getElementById('settingsOverlay').classList.add('hidden');
      }
    });

    document.getElementById('closeSummary').addEventListener('click', () => {
      document.getElementById('monthSummaryOverlay').classList.add('hidden');
    });

    document.getElementById('monthSummaryOverlay').addEventListener('click', (e) => {
      if (e.target === e.currentTarget) {
        document.getElementById('monthSummaryOverlay').classList.add('hidden');
      }
    });

    // ── Reset ─────────────────────────────────────────────
    document.getElementById('resetBtn').addEventListener('click', () => {
      document.getElementById('deleteModal').classList.remove('hidden');
    });

    document.getElementById('deleteCancelBtn').addEventListener('click', () => {
      document.getElementById('deleteModal').classList.add('hidden');
    });

    document.getElementById('deleteConfirmBtn').addEventListener('click', () => {
      document.getElementById('deleteModal').classList.add('hidden');
      localStorage.removeItem('dt_tasks');
      localStorage.removeItem('dt_completions');
      tasks = JSON.parse(JSON.stringify(DEFAULT_TASKS));
      completions = {};
      selectedDate = null;
      save();
      document.getElementById('settingsOverlay').classList.add('hidden');
      closeSheet();
      const today = new Date();
      viewYear = today.getFullYear();
      viewMonth = today.getMonth();
      init();
    });

    // ── Touch gesture for bottom sheet ────────────────────
    let touchStartY = 0;
    const sheet = document.getElementById('bottomSheet');
    sheet.addEventListener('touchstart', (e) => {
      touchStartY = e.touches[0].clientY;
    }, { passive: true });
    sheet.addEventListener('touchend', (e) => {
      const dy = e.changedTouches[0].clientY - touchStartY;
      if (dy > 50) deselectDay();
    }, { passive: true });

    // ── Keyboard navigation ───────────────────────────────
    function navigateDay(offset) {
      const base = selectedDate || todayStr();
      const d = parseDate(base);
      d.setDate(d.getDate() + offset);
      const ds = dateStr(d);
      if (ds > todayStr()) return;
      if (d.getFullYear() !== viewYear || d.getMonth() !== viewMonth) {
        viewYear = d.getFullYear();
        viewMonth = d.getMonth();
      }
      selectedDate = ds;
      renderCalendar();
      renderTaskList();
      openSheet();
      const taskList = document.getElementById('taskList');
      taskList.classList.remove('sheet-fade');
      void taskList.offsetWidth;
      taskList.classList.add('sheet-fade');
    }

    document.addEventListener('keydown', (e) => {
      const inInput = e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA';
      const settingsOpen = !document.getElementById('settingsOverlay').classList.contains('hidden');
      if (e.key === 'Escape') {
        if (settingsOpen) { document.getElementById('settingsOverlay').classList.add('hidden'); return; }
        const summaryOpen = !document.getElementById('monthSummaryOverlay').classList.contains('hidden');
        if (summaryOpen) { document.getElementById('monthSummaryOverlay').classList.add('hidden'); return; }
        if (sheetOpen) deselectDay();
        return;
      }
      if (inInput || settingsOpen) return;
      if (e.key === 'ArrowLeft')  { e.preventDefault(); navigateDay(-1); return; }
      if (e.key === 'ArrowRight') { e.preventDefault(); navigateDay(1);  return; }
      if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (canGoPrev()) { viewMonth--; if (viewMonth < 0) { viewMonth = 11; viewYear--; } if (sheetOpen) deselectDay(); renderCalendar(); }
        return;
      }
      if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (canGoNext()) { viewMonth++; if (viewMonth > 11) { viewMonth = 0; viewYear++; } if (sheetOpen) deselectDay(); renderCalendar(); }
        return;
      }
    });

    // ── Service Worker ────────────────────────────────────
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('./sw.js').catch(() => {});
    }

    // ── Init ─────────────────────────────────────────────
    function init() {
      renderLegend();
      renderCalendar();
      updateStreak();
    }

    init();
  </script>
</body>
</html>
